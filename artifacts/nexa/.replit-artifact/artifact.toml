kind = "web"
previewPath = "/"
title = "Nexa AI"
version = "1.0.0"
id = "artifacts/nexa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18389

[services.development]
run = "pnpm --filter @workspace/nexa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexa", "run", "build" ]
publicDir = "artifacts/nexa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18389"
BASE_PATH = "/"
